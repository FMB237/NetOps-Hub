<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}NetOps Hub{% endblock %}
    </title>

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Bootstrap Icons -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    >

    <!-- Google Font -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <!-- Styles -->
    <link rel="stylesheet" href="{{ url_for('static', path='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/layout.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/navbar.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/sidebar.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/cards.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/devices.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/animation.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/forms.css') }}">

    {% block styles %}{% endblock %}

</head>

<body>

<div class="app-wrapper">

    {% include "components/sidebar.html" %}

    <div class="main-wrapper">

        {% include "components/navbar.html" %}

        <main class="content">

            {% block content %}
            {% endblock %}

        </main>

    </div>

</div>




<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', path='js/sidebar.js') }}"></script>

{% block scripts %}{% endblock %}

</body>

</html>
