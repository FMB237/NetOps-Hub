<form action="{{ form_action }}" method="POST">

    <div class="row">

        <!-- LEFT COLUMN -->

        <div class="col-lg-8">

            <div class="card shadow-sm mb-4">

                <div class="card-header">

                    <h5 class="mb-0">

                        Device Information

                    </h5>

                </div>

                <div class="card-body">

                    <div class="row">

                        <!-- Hostname -->

                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                Hostname

                            </label>

                            <input
                                type="text"
                                class="form-control"
                                name="hostname"
                                value="{{ device.hostname if device else '' }}"
                                required>

                        </div>

                        <!-- IP -->

                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                IP Address

                            </label>

                            <input
                                type="text"
                                class="form-control"
                                name="ip_address"
                                value="{{ device.ip_address if device else '' }}"
                                required>

                        </div>

                        <!-- Vendor -->

                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                Vendor

                            </label>

                            <select
                                class="form-select"
                                name="vendor">

                                {% for vendor in vendors %}

                                <option
                                    value="{{ vendor.value }}"
                                    {% if device and device.vendor == vendor %}selected{% endif %}>

                                    {{ vendor.value }}

                                </option>

                                {% endfor %}

                            </select>

                        </div>

                        <!-- Device Type -->

                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                Device Type

                            </label>

                            <select
                                class="form-select"
                                name="device_type">

                                {% for dtype in device_types %}

                                <option
                                    value="{{ dtype.value }}"
                                    {% if device and device.device_type == dtype %}selected{% endif %}>

                                    {{ dtype.value }}

                                </option>

                                {% endfor %}

                            </select>

                        </div>

                        <!-- Model -->

                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                Model

                            </label>

                            <input
                                type="text"
                                class="form-control"
                                name="model"
                                value="{{ device.model if device else '' }}">

                        </div>

                        <!-- Operating System -->

                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                Operating System

                            </label>

                            <input
                                type="text"
                                class="form-control"
                                name="operating_system"
                                value="{{ device.operating_system if device else '' }}">

                        </div>

                    </div>

                </div>

            </div>

        </div>

        <!-- RIGHT COLUMN -->

        <div class="col-lg-4">

            <div class="card shadow-sm mb-4">

                <div class="card-header">

                    <h5>

                        SSH Configuration

                    </h5>

                </div>

                <div class="card-body">

                    <div class="mb-3">

                        <label class="form-label">

                            SSH Port

                        </label>

                        <input
                            type="number"
                            class="form-control"
                            name="ssh_port"
                            value="{{ device.ssh_port if device else 22 }}">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Username

                        </label>

                        <input
                            class="form-control"
                            name="username"
                            value="{{ device.username if device else '' }}">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Location

                        </label>

                        <input
                            class="form-control"
                            name="location"
                            value="{{ device.location if device else '' }}">

                    </div>

                </div>

            </div>

            <div class="card shadow-sm">

                <div class="card-header">

                    <h5>

                        Notes

                    </h5>

                </div>

                <div class="card-body">

                    <textarea
                        class="form-control"
                        rows="6"
                        name="notes">{{ device.notes if device else '' }}</textarea>

                </div>

            </div>

        </div>

    </div>

    <div class="d-flex justify-content-end mt-4">

        <a
            href="/devices"
            class="btn btn-outline-secondary me-2">

            Cancel

        </a>

        <button
            class="btn btn-primary"
            type="submit">

            {{ submit_label }}

        </button>

    </div>

</form>
