{% extends "base.html" %}

{% block title %}Add Device{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>

            <h2 class="fw-bold">
                Add Network Device
            </h2>

            <p class="text-secondary">
                Register a new device in the inventory.
            </p>

        </div>

        <a href="/devices" class="btn btn-outline-secondary">

            <i class="bi bi-arrow-left"></i>

            Back

        </a>

    </div>

    <form method="post" action="/devices/create">

        <div class="row">

            <!-- Left Column -->

            <div class="col-lg-6">

                <div class="card shadow-sm mb-4">

                    <div class="card-header">

                        <h5 class="mb-0">
                            Basic Information
                        </h5>

                    </div>

                    <div class="card-body">

                        <div class="mb-3">

                            <label class="form-label">
                                Hostname
                            </label>

                            <input
                                type="text"
                                name="hostname"
                                class="form-control"
                                required
                            >

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                IP Address
                            </label>

                            <input
                                type="text"
                                name="ip_address"
                                class="form-control"
                                placeholder="192.168.1.1"
                                required
                            >

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Vendor
                            </label>

                            <select
                                name="vendor"
                                class="form-select"
                                required
                            >

                                {% for vendor in vendors %}

                                    <option value="{{ vendor.value }}">

                                        {{ vendor.value }}

                                    </option>

                                {% endfor %}

                            </select>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Device Type
                            </label>

                            <select
                                name="device_type"
                                class="form-select"
                                required
                            >

                                {% for device_type in device_types %}

                                    <option value="{{ device_type.value }}">

                                        {{ device_type.value }}

                                    </option>

                                {% endfor %}

                            </select>

                        </div>

                    </div>

                </div>

            </div>

            <!-- Right Column -->

            <div class="col-lg-6">

                <div class="card shadow-sm mb-4">

                    <div class="card-header">

                        <h5 class="mb-0">
                            Connection Information
                        </h5>

                    </div>

                    <div class="card-body">

                        <div class="mb-3">

                            <label class="form-label">
                                Model
                            </label>

                            <input
                                type="text"
                                name="model"
                                class="form-control"
                            >

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Operating System
                            </label>

                            <input
                                type="text"
                                name="operating_system"
                                class="form-control"
                            >

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                SSH Port
                            </label>

                            <input
                                type="number"
                                name="ssh_port"
                                class="form-control"
                                value="22"
                            >

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Username
                            </label>

                            <input
                                type="text"
                                name="username"
                                class="form-control"
                            >

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Location
                            </label>

                            <input
                                type="text"
                                name="location"
                                class="form-control"
                            >

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Notes
                            </label>

                            <textarea
                                name="notes"
                                rows="4"
                                class="form-control"
                            ></textarea>

                        </div>

                    </div>

                </div>

            </div>

        </div>

        <div class="text-end">

            <button
                type="submit"
                class="btn btn-primary btn-lg"
            >

                <i class="bi bi-floppy"></i>

                Save Device

            </button>

        </div>

    </form>

</div>

{% endblock %}
