version: "3.9"

services:

  postgres:
    image: postgres:16-alpine                            
    container_name: netops-postgres

    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "5434:5432"

    volumes:
      - postgres_netops_data:/var/lib/postgresql/data

volumes:
  postgres_netops_data: